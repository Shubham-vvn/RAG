<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Feedback</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Deep Space background with glowing spheres -->
  <div class="glass-bg">
    <div class="background-image"></div>
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-2"></div>
    <div class="sphere sphere-3"></div>
  </div>

  <main class="feedback-wrapper">
    <!-- Feedback Form Card -->
    <div class="feedback-card" id="feedbackCard">
      <div class="card-header">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <h1>We Value Your Feedback</h1>
        <p>Your thoughts and suggestions help us improve our services and design better experiences.</p>
      </div>

      <form class="feedback-form" id="feedbackForm" novalidate autocomplete="off">
        <!-- Name Field -->
        <div class="form-group" id="nameGroup">
          <label for="name" class="form-label">Full Name <span class="required-dot">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input 
              type="text" 
              id="name" 
              name="name" 
              required 
              placeholder="e.g. John Doe" 
            />
          </div>
          <span class="error-message" id="nameError">Name is required</span>
        </div>

        <!-- City Field -->
        <div class="form-group" id="cityGroup">
          <label for="city" class="form-label">City <span class="required-dot">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
              </svg>
            </span>
            <input 
              type="text" 
              id="city" 
              name="city" 
              required 
              placeholder="e.g. San Francisco" 
            />
          </div>
          <span class="error-message" id="cityError">City is required</span>
        </div>

        <!-- Feedback Field -->
        <div class="form-group" id="feedbackGroup">
          <label for="feedback" class="form-label">Your Feedback <span class="required-dot">*</span></label>
          <div class="input-wrapper textarea-wrapper">
            <span class="input-icon textarea-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </span>
            <textarea 
              id="feedback" 
              name="feedback" 
              required 
              rows="4" 
              placeholder="What did you like? What can we do better?"
            ></textarea>
            <div class="char-counter"><span id="charCount">0</span> characters</div>
          </div>
          <span class="error-message" id="feedbackError">Feedback is required</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Submit Feedback</span>
          <span class="btn-loader"></span>
        </button>
      </form>
    </div>

    <!-- Success Card (Hidden by default) -->
    <div class="success-card" id="successCard">
      <div class="success-icon-wrapper">
        <svg class="success-checkmark" viewBox="0 0 52 52">
          <circle class="success-checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="success-checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>
      <h2>Thank You!</h2>
      <p class="success-msg">Your feedback has been successfully submitted.</p>
      <div class="submitted-details">
        <div class="detail-row">
          <span class="detail-label">Name:</span>
          <span class="detail-val" id="submittedName">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">City:</span>
          <span class="detail-val" id="submittedCity">-</span>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn">Submit Another Feedback</button>
    </div>
  </main>

  <!-- Script for handling validation & animations -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('feedbackForm');
      const feedbackCard = document.getElementById('feedbackCard');
      const successCard = document.getElementById('successCard');
      const textarea = document.getElementById('feedback');
      const charCount = document.getElementById('charCount');
      
      const nameInput = document.getElementById('name');
      const cityInput = document.getElementById('city');
      
      const submittedName = document.getElementById('submittedName');
      const submittedCity = document.getElementById('submittedCity');
      
      const resetBtn = document.getElementById('resetBtn');
      const submitBtn = document.getElementById('submitBtn');

      // Characters count inside feedback textarea
      textarea.addEventListener('input', () => {
        charCount.textContent = textarea.value.length;
      });

      // Simple real-time validation feedback on blur and input
      const inputs = [nameInput, cityInput, textarea];
      inputs.forEach(input => {
        const errorMsg = document.getElementById(`${input.id}Error`);
        const group = document.getElementById(`${input.id}Group`);

        const validate = () => {
          if (!input.value.trim()) {
            group.classList.add('has-error');
            return false;
          } else {
            group.classList.remove('has-error');
            return true;
          }
        };

        input.addEventListener('blur', validate);
        input.addEventListener('input', () => {
          if (input.value.trim()) {
            group.classList.remove('has-error');
          }
        });
      });

      // Submit action
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let isValid = true;
        
        // Validate all inputs
        inputs.forEach(input => {
          const group = document.getElementById(`${input.id}Group`);
          if (!input.value.trim()) {
            group.classList.add('has-error');
            isValid = false;
          } else {
            group.classList.remove('has-error');
          }
        });

        if (!isValid) {
          // Shake the card to show validation failure
          feedbackCard.classList.add('shake');
          setTimeout(() => {
            feedbackCard.classList.remove('shake');
          }, 500);
          return;
        }

        // Show loading state on button
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        // Simulate submission to server (e.g. 1.2s timeout)
        setTimeout(() => {
          // Fill in details for success screen
          submittedName.textContent = nameInput.value.trim();
          submittedCity.textContent = cityInput.value.trim();

          // Hide form card with animation and show success card
          feedbackCard.classList.add('fade-out');
          
          setTimeout(() => {
            feedbackCard.style.display = 'none';
            successCard.style.display = 'flex';
            setTimeout(() => {
              successCard.classList.add('fade-in');
            }, 50);
          }, 400);
          
          submitBtn.classList.remove('loading');
          submitBtn.disabled = false;
        }, 1200);
      });

      // Reset / Submit another feedback
      resetBtn.addEventListener('click', () => {
        // Reset form inputs
        form.reset();
        charCount.textContent = 0;
        
        // Remove validation errors
        inputs.forEach(input => {
          const group = document.getElementById(`${input.id}Group`);
          group.classList.remove('has-error');
        });

        // Toggle visibility back
        successCard.classList.remove('fade-in');
        setTimeout(() => {
          successCard.style.display = 'none';
          feedbackCard.style.display = 'block';
          feedbackCard.classList.remove('fade-out');
          feedbackCard.classList.add('fade-in');
          setTimeout(() => {
            feedbackCard.classList.remove('fade-in');
          }, 400);
        }, 400);
      });
    });
  </script>
</body>
</html>
